<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Puntos de Recarga CAE - SITME Metrolínea">
    <title>Puntos de Recarga - SITME Metrolínea</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="puntos-recarga">
    <aside id="accessibility-panel" class="accessibility-panel" role="complementary" aria-label="Panel de Accesibilidad">
        <button id="accessibility-toggle" class="accessibility-toggle" aria-label="Abrir panel de accesibilidad">
            <span class="icon-accessibility">♿</span>
        </button>
        <div id="accessibility-content" class="accessibility-content hidden">
            <h3>Accesibilidad</h3>
            <div class="accessibility-controls">
                <label>Tamaño de texto:</label>
                <div class="control-group">
                    <button id="decrease-font" aria-label="Disminuir tamaño">A-</button>
                    <button id="increase-font" aria-label="Aumentar tamaño">A+</button>
                </div>
                <label>Contraste:</label>
                <div class="control-group">
                    <button id="high-contrast" class="filter-btn">Alto Contraste</button>
                    <button id="grayscale" class="filter-btn">Escala de Grises</button>
                    <button id="negative-contrast" class="filter-btn">Contraste Negativo</button>
                </div>
                <label><input type="checkbox" id="underline-links"> Subrayar enlaces</label>
                <label><input type="checkbox" id="readable-font"> Fuente legible uniforme</label>
            </div>
        </div>
    </aside>

    <div class="mobile-container" role="main">
        <header class="page-header">
            <div class="page-header-top">
                <button id="menu-toggle" class="menu-toggle" aria-label="Abrir menú de navegación" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
                <div class="language-selector">
                    <select id="language" aria-label="Cambiar idioma">
                        <option value="es">🇪🇸 Español</option>
                        <option value="en">🇬🇧 English</option>
                    </select>
                </div>
            </div>
            <h1>Puntos de Recarga CAE</h1>
            <p class="page-subtitle">Centros de Atención y Recarga Física</p>
        </header>

        <section class="cae-page" aria-labelledby="cae-title">
            <h2 id="cae-title" class="sr-only">Lista de puntos CAE</h2>
            <p class="cae-page-description">Toca un punto para ver horarios y detalles completos.</p>
            <ul class="cae-list-simple">
                <li class="cae-list-item" data-cae="provenza" tabindex="0" role="button">
                    <span class="cae-pin">📍</span>
                    Provenza
                    <span class="cae-arrow">›</span>
                </li>
                <li class="cae-list-item" data-cae="uis" tabindex="0" role="button">
                    <span class="cae-pin">📍</span>
                    UIS
                    <span class="cae-arrow">›</span>
                </li>
                <li class="cae-list-item" data-cae="portal-norte" tabindex="0" role="button">
                    <span class="cae-pin">📍</span>
                    Portal Norte
                    <span class="cae-arrow">›</span>
                </li>
            </ul>
        </section>

        <div id="cae-modal" class="modal hidden" role="dialog" aria-labelledby="cae-modal-title">
            <div class="modal-content">
                <button class="modal-close" id="cae-modal-close" aria-label="Cerrar">&times;</button>
                <h2 id="cae-modal-title">Punto CAE</h2>
                <div class="cae-modal-info" id="cae-modal-body"></div>
            </div>
        </div>

        <footer class="app-footer">
            <div class="footer-info">
                <p><strong>SITME - Metrolínea</strong></p>
                <p class="footer-version">Versión: v1.0.5+17 (2026)</p>
            </div>
            <div class="footer-links">
                <a href="index.html">Inicio</a>
                <a href="https://www.metrolinea.gov.co" target="_blank" rel="noopener">metrolinea.gov.co</a>
            </div>
        </footer>
    </div>

    <script src="nav.js"></script>
    <script src="script.js"></script>
</body>
</html>
